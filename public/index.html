                <span style="color:var(--muted)">[${ago(e.timestamp)}]</span> プロジェクト: <strong>${esc(e.project)}</strong> <br/>
                <code style="color:#b3402a">${esc(e.preview)}</code>
              </div>
            `).join("")}
          </div>
        </div>
      ` : `
        <div style="color:var(--ok);font-size:13.5px;margin-bottom:16px;display:flex;align-items:center;gap:6px;font-weight:600">
          <span>✔</span> レート制限エラーは検出されていません。正常に動作しています。
        </div>
      `}
      
      ${(() => {
        if (!d.dailyModelTokens || !d.dailyModelTokens.length) return '<div style="font-size:12.5px;color:var(--muted);margin-bottom:16px">トークン使用履歴はありません。</div>';
        const sorted = [...d.dailyModelTokens].sort((a,b) => b.date.localeCompare(a.date));
        const latest = sorted[0];
        const models = Object.entries(latest.tokensByModel || {});
        const totalTokens = models.reduce((acc, [_, val]) => acc + val, 0);
        const limitEstimate = 1000000;
        const pct = Math.min(100, Math.round((totalTokens / limitEstimate) * 100));
        
        return `
          <div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
              <span>直近のトークン消費日: <strong>${latest.date}</strong></span>
              <span>合計: <strong>${totalTokens.toLocaleString()}</strong> tokens</span>
            </div>
            <div style="width:100%;height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin-bottom:8px">
              <div style="width:${pct}%;height:100%;background:${pct > 80 ? '#b3402a' : pct > 50 ? 'var(--accent)' : 'var(--ok)'};border-radius:4px"></div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:8px;font-size:11.5px">
              ${models.map(([name, val]) => `
                <div style="background:var(--surface-2);padding:6px 10px;border-radius:6px;display:flex;justify-content:space-between;border:1px solid var(--border)">
                  <span style="color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;text-align:left" title="${esc(name)}">${esc(name.replace('claude-', ''))}</span>
                  <span style="font-weight:600;color:var(--text)">${val.toLocaleString()}</span>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      })()}
      
      ${(() => {
        if (!d.modelUsage || !Object.keys(d.modelUsage).length) return '';
        const usages = Object.entries(d.modelUsage);
        return `
          <div style="border-top:1px solid var(--border);padding-top:12px">
            <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">モデル別の累計消費（${d.lastComputedDate || "キャッシュ"}時点）</div>
            <div style="display:flex;flex-direction:column;gap:6px;font-size:11.5px">
              ${usages.map(([name, usage]) => {
                const inT = usage.inputTokens || 0;
                const outT = usage.outputTokens || 0;
                const cacheR = usage.cacheReadInputTokens || 0;
                const cacheC = usage.cacheCreationInputTokens || 0;
                const total = inT + outT + cacheR + cacheC;
                return `
                  <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);padding:8px 12px;border-radius:6px;border:1px solid var(--border)">
                    <span style="font-weight:600;color:var(--text);font-size:11.5px;text-align:left">${esc(name)}</span>
                    <span style="color:var(--muted);font-size:11px">
                      合計: <strong style="color:var(--text)">${(total/1000000).toFixed(2)}M</strong> t 
                      (入: ${(inT/1000000).toFixed(2)}M / 出: ${(outT/1000000).toFixed(2)}M / キャッシュ読: ${(cacheR/1000000).toFixed(2)}M)
                    </span>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;
      })()}
    </div>
    <div class="panel">
      <h3>MCP 連携（外部ツール接続）</h3>
      <p style="font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.7">MCPは Claude が外部サービス（Slack・Notion・GitHub等）を操作するための接続です。各アイコンをクリックすると「できること・使い方」が見られます。<b>接続済み</b>はすぐ使え、<b>未認証</b>はログインすると使えます。</p>
      ${mcp.connected&&mcp.connected.length?`<div class="pj-h" style="margin-bottom:8px">接続済み（${mcp.connected.length}）</div>
        <div class="mcp-grid">${mcp.connected.map(m=>{const info=mcpInfo(m.name);return `<div class="mcp-item" onclick="openMcp('${esc(m.name)}',true)"><span class="mcp-ic">${mcpIcon(info)}</span><div class="mcp-tx"><div class="mcp-nm">${esc(info.l!==info.id?info.l:m.name)}</div><div class="mcp-st" style="color:${m.ok?'var(--ok)':'#b3402a'}">${m.ok?'接続中':'要確認'}</div></div></div>`;}).join("")}</div>`:""}
      ${mcp.needsAuth&&mcp.needsAuth.length?`<div class="pj-h" style="margin:14px 0 8px">未認証の連携（${mcp.needsAuth.length}）— ログインで利用可能</div>
        <div class="mcp-grid">${mcp.needsAuth.map(k=>{const info=mcpInfo(k);return `<div class="mcp-item" onclick="openMcp('${esc(k)}',false)"><span class="mcp-ic">${mcpIcon(info)}</span><div class="mcp-tx"><div class="mcp-nm">${esc(info.l)}</div><div class="mcp-st">${esc(info.d)}</div></div></div>`;}).join("")}</div>`:""}
      <div class="pj-h" style="margin:16px 0 8px">MCPを追加</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input id="mcp-name" placeholder="名前 (例: sentry)" style="flex:0 1 140px;background:var(--bg);border:1px solid var(--border-strong);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--text)"/>
        <input id="mcp-url" placeholder="URL (https://mcp.example.com/mcp)" style="flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border-strong);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--text)"/>
        <button class="btn save" id="mcp-add" onclick="addMcp()">追加</button>
      </div>
      <div id="mcp-out" style="margin-top:8px"></div>
    </div>`;
}
async function addMcp(){
  const name=document.getElementById("mcp-name").value.trim(), url=document.getElementById("mcp-url").value.trim();
  if(!name||!url) return;
  const out=document.getElementById("mcp-out"), btn=document.getElementById("mcp-add");
  btn.disabled=true; out.innerHTML='<span style="color:var(--muted);font-size:13px">追加中…</span>';
  try{
    const j=await (await api("/api/mcp/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,url})})).json();
    if(j.ok){ out.innerHTML='<span style="color:var(--ok);font-size:13px">追加しました</span>'; logActivity(`MCP追加: ${name}`); cache.mcp=null; setTimeout(()=>go('stats'),700); }
    else out.innerHTML=`<span style="color:#b3402a;font-size:13px">${esc(j.error)}</span>`;
  }catch(e){ out.innerHTML=`<span style="color:#b3402a;font-size:13px">${esc(e.message)}</span>`; }
  btn.disabled=false;
}

/* ── Editor ── */
function setPreview(on){
  // on=プレビュー（rendered）/ off=生MD編集
  document.getElementById("m-text").style.display = on ? "none" : "block";
  document.getElementById("m-render").style.display = on ? "block" : "none";
  document.getElementById("m-preview").textContent = on ? "編集（MD）" : "プレビュー";
  if (on) document.getElementById("m-render").innerHTML = mdToHtml(document.getElementById("m-text").value);
}
function togglePreview(){ setPreview(document.getElementById("m-render").style.display==="none"); }

async function openFile(p, title, opts={}) {
  curPath = p;
  document.getElementById("m-title").textContent = title;
  document.getElementById("m-path").textContent = p;
  const isMd = /\.md$/.test(p);
  const ta = document.getElementById("m-text");
  ta.value = "読み込み中…";
  setPreview(false);
  document.getElementById("modal").classList.add("on");
  const j = await (await api(`/api/file?path=${encodeURIComponent(p)}`)).json();
  if (!j.ok) { ta.value = "（読込失敗）" + j.error; return; }
  ta.value = j.content; ta.readOnly = !j.writable;
  document.getElementById("m-save").disabled = !j.writable;
  document.getElementById("m-ro").textContent = j.writable ? "" : "読み取り専用（編集不可パス）";
  document.getElementById("m-preview").style.display = isMd ? "inline-block" : "none";
  document.getElementById("m-del").style.display = (opts.deletable && j.writable) ? "inline-block" : "none";
  setPreview(isMd); // .md は既定でプレビュー表示、編集時だけ生MD
}
function closeModal(){ document.getElementById("modal").classList.remove("on"); curPath=null; }
async function saveFile() {
  const content = document.getElementById("m-text").value;
  const btn = document.getElementById("m-save");
  btn.disabled = true; btn.textContent = "保存中…";
  const title = document.getElementById("m-title").textContent;
  const j = await (await api("/api/file",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:curPath,content})})).json();
  if (j.ok) { btn.textContent="保存しました"; logActivity(`保存: ${title}`); cache={}; setTimeout(()=>{ closeModal(); go(active); btn.textContent="保存"; btn.disabled=false; },650); }
  else { alert("保存失敗: "+j.error); btn.textContent="保存"; btn.disabled=false; }
}
async function deleteFile(){
  if (!confirm("このファイルを削除します（.bak を残します）。よろしいですか？")) return;
  const title = document.getElementById("m-title").textContent;
  const j = await (await api(`/api/file?path=${encodeURIComponent(curPath)}`,{method:"DELETE"})).json();
  if (j.ok) { logActivity(`削除: ${title}`); cache={}; closeModal(); go(active); }
  else alert("削除失敗: "+j.error);
}

/* ── 新規作成 ── */
let createCtx = null;
function openCreate(type, projectKey){
  createCtx = { type: type || META[active].create, projectKey };
  document.getElementById("c-title").textContent =
    createCtx.type==="skill"?"新規スキル":createCtx.type==="agent"?"新規サブエージェント":"新規メモリ";
  document.getElementById("c-hint").textContent = CREATE_HINT[createCtx.type] || "";
  document.getElementById("c-name").value = "";
  document.getElementById("createModal").classList.add("on");
  setTimeout(()=>document.getElementById("c-name").focus(), 50);
}
function closeCreate(){ document.getElementById("createModal").classList.remove("on"); createCtx=null; }
async function doCreate(){
  const name = document.getElementById("c-name").value.trim();
  if (!name) return;
  const body = { type:createCtx.type, name, projectKey:createCtx.projectKey };
  const j = await (await api("/api/create",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})).json();
  if (!j.ok) { alert("作成失敗: "+j.error); return; }
  const type = createCtx.type;
  logActivity(`作成: ${type==="skill"?"スキル":type==="agent"?"サブエージェント":"メモリ"}「${name}」`);
  closeCreate(); cache={};
  // 作成直後に編集を開く
  openFile(j.path, name, { deletable:true });
  // 一覧を更新
  if (type==="memory") cache.projects=null; else cache[type==="skill"?"skills":"agents"]=null;
}

/* ── 最小Markdownレンダラ（プレビュー用・参照性向上） ── */
function mdToHtml(md){
  const esc2 = s => s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  // frontmatter を枠で表示
  let fm = "";
  md = md.replace(/^---\n([\s\S]*?)\n---\n?/, (_,b)=>{ fm = `<pre style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--muted);overflow:auto">${esc2(b)}</pre>`; return ""; });
  const lines = md.split("\n"); let html=""; let inList=false, inCode=false;
  for (let ln of lines){
    if (/^```/.test(ln)){ if(inCode){html+="</pre>";inCode=false;} else {html+='<pre style="background:var(--surface-2);border-radius:8px;padding:12px;overflow:auto;font-size:12.5px">';inCode=true;} continue; }
    if (inCode){ html+=esc2(ln)+"\n"; continue; }
    ln = esc2(ln)
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/`([^`]+)`/g,'<code style="background:var(--surface-2);padding:1px 5px;border-radius:4px;font-size:.9em">$1</code>')
      .replace(/\[\[([^\]]+)\]\]/g,'<span style="color:var(--accent)">[[$1]]</span>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" style="color:var(--accent)">$1</a>');
    let m;
    if (m=ln.match(/^(#{1,4})\s+(.*)/)){ if(inList){html+="</ul>";inList=false;} const lv=m[1].length; html+=`<h${lv} style="margin:14px 0 6px;font-size:${20-lv*2}px;font-weight:600">${m[2]}</h${lv}>`; }
    else if (/^[-*]\s+/.test(ln)){ if(!inList){html+='<ul style="margin:6px 0;padding-left:20px">';inList=true;} html+=`<li style="margin:3px 0">${ln.replace(/^[-*]\s+/,'')}</li>`; }
    else if (ln.trim()===""){ if(inList){html+="</ul>";inList=false;} html+=""; }
    else { if(inList){html+="</ul>";inList=false;} html+=`<p style="margin:6px 0;line-height:1.7">${ln}</p>`; }
  }
  if(inList)html+="</ul>"; if(inCode)html+="</pre>";
  return fm+html;
}

document.addEventListener("keydown", e => {
  if(e.key==="Escape"){ closeModal(); closeCreate(); closeMcp(); }
  if((e.metaKey||e.ctrlKey) && (e.key==="j"||e.key==="J")){ e.preventDefault(); toggleWidget(); }
});

/* ── サイドバー（ドロワー） ── */
let navOpen = window.innerWidth > 760;
function applyNav(){
  document.querySelector(".app").classList.toggle("nav-hidden", !navOpen);
  document.getElementById("nav-ovl").classList.toggle("on", navOpen && window.innerWidth<=760);
}
function toggleNav(force){ navOpen = (force===undefined)? !navOpen : !!force; applyNav(); }
// モバイルでメニュー選択したら閉じる
document.querySelectorAll(".navitem").forEach(n=>n.addEventListener("click",()=>{ if(window.innerWidth<=760) toggleNav(false); }));
applyNav();

go("home");
// 件数を常に表示（ローカル読み取りのみ・Claude枠は使わない）
["skills","agents","projects","sessions","routines"].forEach(t=>{
  const ep = t==="routines" ? "/api/routines" : `/api/${t}`;
  api(ep).then(r=>r.json()).then(d=>{
    if(t==="routines"){ const n=(d.agents||[]).length; const el=document.getElementById("ct-routines"); if(el)el.textContent=n||""; return; }
    cache[t]=cache[t]||d; const el=document.getElementById("ct-"+t); if(el&&Array.isArray(d))el.textContent=d.length;
    if(t==="projects") fillWidgetTargets();
  }).catch(()=>{});
});

// プロジェクト状況をアシスタントに更新依頼
function updateProjectStatus(name, path){
  toggleWidget(true); setMode('apply');
  const sel=document.getElementById("fw-target"); if(sel){ const opt=[...sel.options].find(o=>o.value==='project::'+path); if(opt) sel.value=opt.value; }
  const ta=document.getElementById("fw-prompt");
  if(ta){ ta.value=`プロジェクト「${name}」の現状を点検し、README.md / CLAUDE.md / ROADMAP.md の概要・ロードマップ・課題を最新の実態に合わせて更新してください。完了タスクのチェック、未完・新規課題の追記、概要のズレ修正を行い、変更点を報告してください。`; ta.focus(); }
}
