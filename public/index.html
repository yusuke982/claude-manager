<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClaudeManager</title>
<style>
  :root {
    --bg:#faf9f5; --surface:#ffffff; --surface-2:#f3f1ea; --hover:#f0eee6;
    --border:#e6e3d9; --border-strong:#d8d4c7;
    --text:#1f1e1d; --muted:#73716a; --faint:#9b988e;
    --accent:#c96442; --accent-soft:#f6e9e2; --accent-line:#e8c7b8;
    --ok:#5c8a5a; --info:#5a76b8;
    --serif:"Tiempos",ui-serif,Georgia,"Times New Roman",serif;
    --sans:ui-sans-serif,-apple-system,"Hiragino Kaku Gothic ProN","Helvetica Neue",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; max-width:100%; overflow-x:hidden; }
  body { margin:0; font-family:var(--sans); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; font-size:14px; }
  a { color:inherit; }
  .topbar > * { min-width:0; }
  .wordmark { overflow:hidden; }
  .wordmark span:last-child { overflow:hidden; text-overflow:ellipsis; }

  .app { min-height:100vh; }

  /* ── Sidebar (drawer) ── */
  aside { background:var(--surface-2); border-right:1px solid var(--border); padding:22px 14px; display:flex; flex-direction:column; gap:6px; position:fixed; top:0; left:0; width:248px; height:100vh; z-index:40; transition:transform .22s ease; overflow-y:auto; }
  .app.nav-hidden aside { transform:translateX(-100%); }
  .brand { display:flex; align-items:baseline; gap:8px; padding:4px 10px 18px; }
  .brand h1 { font-family:var(--serif); font-size:20px; font-weight:600; margin:0; letter-spacing:-.01em; }
  .navitem { display:flex; align-items:center; justify-content:space-between; padding:8px 11px; border-radius:8px; cursor:pointer; color:var(--muted); font-weight:500; transition:background .12s,color .12s; }
  .navitem:hover { background:var(--hover); color:var(--text); }
  .navitem.active { background:var(--surface); color:var(--text); box-shadow:0 0 0 1px var(--border); font-weight:600; }
  .navitem .ct { font-size:12px; color:var(--faint); font-variant-numeric:tabular-nums; }
  .navitem.active .ct { color:var(--accent); }

  /* ── Main ── */
  main { display:flex; flex-direction:column; min-width:0; margin-left:248px; transition:margin-left .22s ease; }
  .app.nav-hidden main { margin-left:0; }
  .topbar { position:sticky; top:0; z-index:5; background:rgba(250,249,245,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:18px 28px; display:flex; align-items:center; gap:18px; }
  .topbar h2 { font-family:var(--serif); font-weight:600; font-size:18px; margin:0; letter-spacing:-.01em; }
  .topbar .desc { color:var(--muted); font-size:12.5px; }
  .wordmark { font-family:var(--serif); font-weight:600; font-size:17px; cursor:pointer; display:flex; align-items:center; gap:7px; white-space:nowrap; color:var(--text); }
  .pagehead { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; padding:18px 28px 0; max-width:100%; }
  .pagehead h2 { font-family:var(--serif); font-weight:600; font-size:22px; margin:0; letter-spacing:-.01em; }
  .pagehead .desc { color:var(--muted); font-size:12.5px; margin-top:2px; }
  .search { margin-left:auto; position:relative; }
  .search input { width:240px; background:var(--surface); border:1px solid var(--border-strong); border-radius:9px; padding:8px 12px 8px 32px; font-size:13px; font-family:var(--sans); color:var(--text); outline:none; transition:border-color .12s,box-shadow .12s; }
  .search input:focus { border-color:var(--accent-line); box-shadow:0 0 0 3px var(--accent-soft); }
  .search svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--faint); }
  .content { padding:22px 28px 70px; }

  /* ── List rows (Skills/Agents) ── */
  .list { border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--surface); }
  .rowitem { display:grid; grid-template-columns:minmax(180px,1.1fr) 2.4fr auto; gap:18px; align-items:center; padding:13px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
  .rowitem:last-child { border-bottom:none; }
  .rowitem:hover { background:var(--hover); }
  .rowitem .nm { font-weight:600; font-size:13.5px; display:flex; align-items:center; gap:9px; min-width:0; }
  .rowitem .nm .label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rowitem .ds { color:var(--muted); font-size:12.5px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .badge { font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:5px; white-space:nowrap; letter-spacing:.02em; }
  .badge.local { background:var(--accent-soft); color:var(--accent); }
  .badge.user { background:#e7efe6; color:var(--ok); }
  .badge.plugin { background:#e9edf6; color:var(--info); }
  .act { color:var(--faint); font-size:12px; font-weight:600; opacity:0; transition:opacity .1s; }
  .rowitem:hover .act { opacity:1; color:var(--accent); }

  /* ── Project cards ── */
  .pgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:14px; }
  .pcard { border:1px solid var(--border); border-radius:12px; background:var(--surface); padding:0; overflow:hidden; }
  .pcard .ph { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .pcard .ph .pname { font-family:var(--mono); font-size:12px; color:var(--text); word-break:break-all; line-height:1.5; }
  .pcard .ph .meta { font-size:11.5px; color:var(--muted); margin-top:3px; }
  .pcard .pb { padding:8px 10px; display:flex; flex-direction:column; }
  .pcard-lg .pb-lg { padding:0; }
  .pj-eye { padding:13px 16px; background:linear-gradient(180deg,var(--accent-soft),transparent); border-bottom:1px solid var(--border); font-size:13px; line-height:1.7; color:var(--text); position:relative; }
  .pj-eye.muted { background:none; color:var(--faint); font-size:12px; }
  .pj-src { font-size:10px; color:var(--faint); font-weight:600; margin-left:6px; }
  .pj-sec { padding:12px 16px; border-bottom:1px solid var(--border); }
  .pj-sec:last-child { border-bottom:none; }
  .pj-h { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:9px; }
  .pj-bar { height:7px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
  .pj-bar > div { height:100%; background:var(--accent); border-radius:4px; }
  .pj-barlbl { font-size:11px; color:var(--muted); margin-top:5px; font-variant-numeric:tabular-nums; }
  .pj-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .pj-tag { font-size:11px; background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:3px 9px; color:var(--muted); }
  .pj-list { margin:9px 0 0; padding-left:18px; font-size:12.5px; line-height:1.7; color:var(--text); }
  .pj-list li { margin:2px 0; }
  .pj-list.warn li { color:#9a4a32; }
  .mcp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
  .mcp-item { display:flex; gap:10px; align-items:center; padding:9px 11px; border:1px solid var(--border); border-radius:9px; background:var(--surface); }
  .mcp-ic { flex-shrink:0; display:inline-flex; }
  .mcp-tx { min-width:0; }
  .mcp-nm { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mcp-st { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mcp-item { cursor:pointer; transition:background .1s; }
  .mcp-item:hover { background:var(--hover); }
  .mcp-fb { width:24px; height:24px; border-radius:6px; background:var(--surface-2); display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--muted); }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; }
  .scard { border:1px solid var(--border); border-radius:12px; background:var(--surface); padding:14px 16px; cursor:pointer; transition:border-color .12s,box-shadow .12s; }
  .scard:hover { border-color:var(--accent-line); box-shadow:0 3px 12px rgba(31,30,29,.06); }
  .scard-h { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:7px; }
  .scard-nm { font-weight:700; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scard-d { color:var(--muted); font-size:12.5px; line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .scard-nm { -webkit-line-clamp:2; white-space:normal; display:-webkit-box; -webkit-box-orient:vertical; max-height:2.8em; }
  /* セッション：プロジェクト見出し＋要約（更新ログ） */
  .sess-grp-h { font-family:var(--serif); font-size:15px; font-weight:600; margin:20px 2px 10px; letter-spacing:-.01em; }
  .sess-grp-h:first-child { margin-top:0; }
  .d-chips { display:flex; flex-wrap:wrap; gap:7px; }
  .d-chip { font-size:11.5px; font-weight:600; padding:4px 10px; border:1px solid var(--border-strong); border-radius:7px; color:var(--muted); background:var(--surface); }
  .d-chip b { color:var(--text); font-variant-numeric:tabular-nums; }
  .d-changes { display:flex; flex-direction:column; gap:2px; }
  .d-change { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .d-change:last-child { border-bottom:none; }
  .d-act { font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:5px; flex-shrink:0; }
  .d-act.edit { background:var(--accent-soft); color:var(--accent); }
  .d-act.new { background:#e7efe6; color:var(--ok); }
  .d-file { font-family:var(--mono); font-size:12.5px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .d-cnt { margin-left:auto; font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; }
  .d-decs { display:flex; flex-direction:column; gap:1px; }
  .d-dec { display:flex; gap:9px; align-items:flex-start; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.6; color:var(--text); }
  .d-dec:last-child { border-bottom:none; }
  .d-check { color:var(--ok); font-weight:800; flex-shrink:0; font-size:12px; margin-top:1px; }
  .d-grp { margin-bottom:14px; }
  .d-grp:last-child { margin-bottom:0; }
  .d-grp-h { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:4px; }
  /* 優先度バッジ */
  .prio { font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:5px; white-space:nowrap; }
  .prio.h { background:#fbe4dd; color:#b3402a; }
  .prio.m { background:#f3ecd9; color:#9a7b1f; }
  .prio.l { background:#e7efe6; color:var(--ok); }
  .req-row { display:flex; gap:10px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--border); }
  .req-row:last-child { border-bottom:none; }
  .req-row.done { opacity:.5; }
  .req-row.done .req-t { text-decoration:line-through; }
  .req-t { font-size:13.5px; font-weight:600; line-height:1.5; }
  .req-meta { font-size:11px; color:var(--faint); margin-top:2px; }
  #toast { position:fixed; left:50%; bottom:24px; transform:translate(-50%,40px); background:#1f1e1d; color:#fff; padding:11px 18px; border-radius:10px; font-size:13px; font-weight:500; box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:.25s; z-index:80; max-width:90vw; text-align:center; }
  #toast.on { opacity:1; transform:translate(-50%,0); }
  /* プロジェクト：コンパクトカード */
  .pcard-c { border:1px solid var(--border); border-radius:14px; background:var(--surface); padding:16px 18px; cursor:pointer; transition:border-color .12s,box-shadow .12s,transform .1s; }
  .pcard-c:hover { border-color:var(--accent-line); box-shadow:0 4px 16px rgba(31,30,29,.07); transform:translateY(-1px); }
  .pcard-c-top { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .pcard-c-nm { font-weight:700; font-size:16px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pcard-c-ov { color:var(--muted); font-size:12.5px; line-height:1.6; margin-top:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .ring { --p:0; flex-shrink:0; width:46px; height:46px; border-radius:50%; display:grid; place-items:center; background:conic-gradient(var(--accent) calc(var(--p)*1%), var(--surface-2) 0); }
  .ring span { width:36px; height:36px; border-radius:50%; background:var(--surface); display:grid; place-items:center; font-size:11px; font-weight:800; color:var(--accent); }
  /* プロジェクト詳細 LP */
  .lp { max-width:820px; }
  /* ── ホーム（LP） ── */
  .home { max-width:920px; }
  .home-hero { padding:26px 28px 30px; border:1px solid var(--accent-line); border-radius:18px; background:radial-gradient(120% 140% at 0% 0%, var(--accent-soft), var(--surface) 60%); margin-bottom:22px; }
  .home-eyebrow { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.12em; }
  .home-title { font-family:var(--serif); font-size:34px; font-weight:600; letter-spacing:-.02em; margin:8px 0 0; line-height:1.15; }
  .home-lead { font-size:14.5px; line-height:1.85; color:var(--muted); margin:14px 0 0; max-width:640px; }
  .home-cta { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; }
  .home-sec { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin:24px 2px 12px; }
  .home-notes { display:flex; flex-direction:column; gap:10px; }
  .home-note { display:flex; gap:12px; align-items:flex-start; border:1px solid var(--border); border-radius:13px; background:var(--surface); padding:14px 16px; }
  .home-note .ni { width:30px; height:30px; flex-shrink:0; border-radius:9px; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; }
  .home-note b { font-size:13.5px; }
  .home-note p { font-size:12.5px; line-height:1.7; color:var(--muted); margin:4px 0 0; }
  .home-note code { font-family:var(--mono); font-size:11.5px; background:var(--surface-2); padding:1px 5px; border-radius:4px; }
  .home-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; }
  .home-art { border:1px solid var(--border); border-radius:16px; background:var(--surface); padding:18px 18px 16px; cursor:pointer; transition:border-color .12s,box-shadow .12s,transform .1s; display:flex; flex-direction:column; gap:4px; }
  .home-art:hover { border-color:var(--accent-line); box-shadow:0 6px 20px rgba(31,30,29,.07); transform:translateY(-2px); }
  .home-art .ic { width:38px; height:38px; border-radius:11px; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
  .home-art .num { font-family:var(--serif); font-size:30px; font-weight:600; line-height:1; letter-spacing:-.02em; }
  .home-art .num span { font-size:13px; color:var(--faint); font-family:var(--sans); font-weight:500; margin-left:3px; }
  .home-art .nm { font-size:14.5px; font-weight:700; }
  .home-art .ds { font-size:12px; color:var(--muted); line-height:1.6; }
  .home-art .hl { font-size:11px; color:var(--accent); font-weight:600; margin-top:auto; padding-top:6px; }
  @media (max-width:760px){ .home-hero{padding:22px 18px 24px} .home-title{font-size:26px} .home-grid{grid-template-columns:1fr 1fr;gap:10px} .home-art{padding:14px} .home-art .num{font-size:24px} }
  .lp-hero { padding:6px 2px 20px; }
  .rs-bar { display:flex; gap:8px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:6px 6px 6px 12px; margin-bottom:8px; }
  .rs-bar input#rs-prompt { flex:1; min-width:0; border:none; background:none; outline:none; font-size:13.5px; font-family:var(--sans); color:var(--text); padding:6px 0; }
  .rs-bar select#rs-model { border:1px solid var(--border); background:var(--surface-2); border-radius:7px; padding:5px 7px; font-size:11.5px; color:var(--muted); }
  .rs-bar .rs-edit { display:flex; align-items:center; gap:4px; font-size:11.5px; color:var(--muted); white-space:nowrap; }
  .rs-bar .btn.save { padding:7px 14px; }
  .lp-title { font-family:var(--serif); font-size:30px; font-weight:600; margin:0; letter-spacing:-.02em; }
  .lp-path { font-family:var(--mono); font-size:11.5px; color:var(--faint); margin-top:4px; word-break:break-all; }
  .lp-lead { font-size:14.5px; line-height:1.8; color:var(--text); margin:14px 0 0; }
  .lp-lead.muted { color:var(--faint); }
  .lp-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:18px; }
  .lp-card { border:1px solid var(--border); border-radius:14px; background:var(--surface); padding:18px 20px; margin-bottom:14px; }
  .lp-h { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px; }
  .lp-rm { display:flex; gap:20px; align-items:center; }
  .lp-gauge { position:relative; width:120px; height:120px; flex-shrink:0; }
  .lp-gauge svg { width:120px; height:120px; transform:rotate(-90deg); }
  .lp-gauge .g-bg { fill:none; stroke:var(--surface-2); stroke-width:11; }
  .lp-gauge .g-fg { fill:none; stroke:var(--accent); stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset .6s ease; }
  .lp-gauge-c { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .lp-gauge-c b { font-family:var(--serif); font-size:26px; line-height:1; }
  .lp-gauge-c span { font-size:11px; color:var(--muted); margin-top:3px; }
  .lp-timeline { display:flex; flex-direction:column; gap:0; }
  .lp-tl { display:flex; gap:11px; align-items:flex-start; position:relative; padding-bottom:14px; }
  .lp-tl:not(:last-child)::before { content:""; position:absolute; left:5px; top:13px; bottom:0; width:2px; background:var(--border); }
  .lp-dot { width:12px; height:12px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-top:2px; box-shadow:0 0 0 3px var(--accent-soft); z-index:1; }
  .lp-tln { font-size:13.5px; font-weight:600; line-height:1.4; }
  .lp-checks { display:flex; flex-direction:column; gap:9px; }
  .lp-chk { display:flex; gap:10px; align-items:flex-start; font-size:13px; line-height:1.6; }
  .lp-box { width:16px; height:16px; border-radius:5px; border:2px solid var(--border-strong); flex-shrink:0; margin-top:2px; }
  .lp-chk.warn span:last-child { color:#9a4a32; }
  .lp-box.warn { border-color:#d9a08e; background:#fbeae6; border-radius:50%; }
  .act-day { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.04em; margin:14px 0 8px; }
  .act-day:first-child { margin-top:0; }
  .act-row { border-left:2px solid var(--accent-line); padding:2px 0 10px 13px; margin-left:4px; }
  .act-ask { font-size:13.5px; line-height:1.6; color:var(--text); }
  .act-meta { font-size:11px; color:var(--faint); margin-top:3px; }
  @media (max-width:760px){ .lp-rm{flex-direction:column;align-items:flex-start;gap:14px} .lp-title{font-size:24px} }
  .frow { display:flex; justify-content:space-between; align-items:center; padding:7px 8px; border-radius:7px; font-size:12px; }
  .frow:hover { background:var(--hover); cursor:pointer; }
  .frow .fn { color:var(--text); display:flex; gap:8px; align-items:center; min-width:0; }
  .frow .fn .t { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .frow .fa { color:var(--faint); font-size:11px; font-weight:600; flex-shrink:0; white-space:nowrap; margin-left:8px; }
  .frow:hover .fa { color:var(--accent); }
  .ix { font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:.06em; }
  .linkbtn { font-size:11.5px; font-weight:600; color:var(--accent); cursor:pointer; border:1px solid var(--accent-line); background:var(--surface); border-radius:7px; padding:4px 10px; white-space:nowrap; }
  .linkbtn:hover { background:var(--accent-soft); }

  /* ── Overview ── */
  .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
  .tile { border:1px solid var(--border); border-radius:12px; background:var(--surface); padding:18px; }
  .tile .n { font-family:var(--serif); font-size:30px; font-weight:600; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .tile .l { font-size:12px; color:var(--muted); margin-top:4px; }
  .panel { border:1px solid var(--border); border-radius:12px; background:var(--surface); padding:18px 20px; margin-bottom:14px; }
  .panel h3 { margin:0 0 14px; font-size:13px; font-weight:600; color:var(--text); text-transform:uppercase; letter-spacing:.05em; }
  .bars { display:flex; align-items:flex-end; gap:3px; height:120px; }
  .bars .b { flex:1; background:var(--accent); opacity:.32; border-radius:3px 3px 0 0; min-height:2px; transition:opacity .1s; }
  .bars .b:hover { opacity:.7; }
  .kv { display:flex; flex-direction:column; gap:9px; }
  .kv .r { display:flex; justify-content:space-between; gap:8px 14px; font-size:13px; padding-bottom:9px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .kv .r:last-child { border-bottom:none; padding-bottom:0; }
  .kv .r .k { color:var(--muted); flex-shrink:0; }
  .kv .r .v { color:var(--text); font-weight:500; text-align:right; font-family:var(--mono); font-size:12px; min-width:0; word-break:break-all; overflow-wrap:anywhere; }
  /* どのパネル/グリッドも画面幅を超えない安全策 */
  .content, .panel, .two, .tiles, .card-grid, .pgrid, .mcp-grid, .list { max-width:100%; }
  .frow, .rowitem, .mcp-item, .scard { max-width:100%; overflow:hidden; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; }
  .chip { font-size:12px; background:var(--surface-2); border:1px solid var(--border); border-radius:7px; padding:4px 10px; color:var(--muted); font-family:var(--mono); }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .two > * { min-width:0; }
  .empty { color:var(--muted); padding:60px 20px; text-align:center; font-size:14px; }

  /* ── Editor modal ── */
  .modal { position:fixed; inset:0; background:rgba(31,30,29,.34); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; padding:24px; z-index:50; }
  .modal.on { display:flex; }
  .modal .box { background:var(--surface); border:1px solid var(--border-strong); border-radius:14px; width:100%; max-width:820px; max-height:88vh; display:flex; flex-direction:column; box-shadow:0 24px 60px rgba(31,30,29,.22); overflow:hidden; }
  .modal .top { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:14px; }
  .modal .top .ttl { font-weight:600; font-size:15px; }
  .modal .top .path { font-size:11px; color:var(--faint); font-family:var(--mono); word-break:break-all; margin-top:2px; }
  .modal .x { border:none; background:none; color:var(--muted); font-size:16px; cursor:pointer; padding:4px 8px; border-radius:6px; }
  .modal .x:hover { background:var(--hover); }
  .modal textarea { flex:1; min-height:56vh; background:var(--bg); color:var(--text); border:none; padding:18px 20px; font-family:var(--mono); font-size:13px; line-height:1.7; resize:none; outline:none; }
  .modal .btns { padding:13px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; align-items:center; }
  .btn { border:none; border-radius:8px; padding:9px 18px; font-weight:600; font-size:13px; cursor:pointer; font-family:var(--sans); }
  .btn.save { background:var(--accent); color:#fff; }
  .btn.save:hover { background:#b8573a; }
  .btn.cancel { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .ro { color:var(--accent); font-size:12px; margin-right:auto; font-weight:500; }

  /* ── Floating operator ── */
  .fab { position:fixed; right:22px; bottom:22px; z-index:60; width:56px; height:56px; border-radius:50%; background:var(--accent); border:none; cursor:pointer; box-shadow:0 8px 24px rgba(201,100,66,.4); display:flex; align-items:center; justify-content:center; transition:transform .12s; }
  .fab:hover { transform:scale(1.06); }
  .fab svg { color:#fff; }
  .fab .ring { position:absolute; inset:-4px; border-radius:50%; border:2.5px solid transparent; border-top-color:#fff; opacity:0; }
  .fab.busy .ring { opacity:.9; animation:spin .8s linear infinite; }
  /* Claudeキャラ：待機=寝顔+Zzz / 作業=起きて動く */
  .fab .mascot { width:34px; height:34px; overflow:visible; }
  .fab .mascot .body { transform-box:fill-box; transform-origin:center; animation:breathe 3.2s ease-in-out infinite; }
  .fab .mascot .awake { display:none; }
  .fab .mascot .zzz { opacity:0; animation:zzz 2.6s ease-in-out infinite; }
  .fab.busy .mascot .asleep { display:none; }
  .fab.busy .mascot .awake { display:block; }
  .fab.busy .mascot .body { animation:hop .5s ease-in-out infinite; }
  .fab.busy .mascot .zzz { display:none; }
  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  @keyframes hop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2.5px)} }
  @keyframes zzz { 0%{opacity:0;transform:translate(0,0) scale(.7)} 30%{opacity:1} 100%{opacity:0;transform:translate(4px,-9px) scale(1.1)} }
  /* Hamburger + drawer */
  .ham { display:inline-flex; flex-direction:column; gap:4px; width:34px; height:34px; align-items:center; justify-content:center; border:1px solid var(--border); background:var(--surface); border-radius:9px; cursor:pointer; flex-shrink:0; }
  .ham span { width:16px; height:2px; background:var(--text); border-radius:2px; transition:.2s; }
  .nav-ovl { position:fixed; inset:0; background:rgba(31,30,29,.3); z-index:39; display:none; }
  .nav-ovl.on { display:block; }
  .fab .dot { position:absolute; top:-2px; right:-2px; min-width:18px; height:18px; padding:0 4px; border-radius:9px; background:#1f1e1d; color:#fff; font-size:10px; font-weight:700; display:none; align-items:center; justify-content:center; }
  .fab.has-unseen .dot { display:flex; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .fw { position:fixed; right:22px; bottom:88px; z-index:60; width:min(420px,calc(100vw - 28px)); height:min(620px,calc(100vh - 130px)); background:var(--surface); border:1px solid var(--border-strong); border-radius:16px; box-shadow:0 20px 60px rgba(31,30,29,.28); display:none; flex-direction:column; overflow:hidden; }
  .fw.on { display:flex; }
  .fw.on ~ .fab { display:none; }
  .fw-head { padding:13px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .fw-head .t { font-family:var(--serif); font-weight:600; font-size:16px; }
  .fw-head .sp { width:14px; height:14px; border:2px solid var(--border-strong); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; display:none; }
  .fw-head.busy .sp { display:inline-block; }
  .fw-head .x { margin-left:auto; border:none; background:none; color:var(--muted); cursor:pointer; font-size:15px; padding:4px 7px; border-radius:6px; }
  .fw-head .x:hover { background:var(--hover); }
  .fw-ctl { display:flex; gap:6px; padding:9px 12px; border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
  .fw-ctl select { background:var(--surface); border:1px solid var(--border-strong); border-radius:7px; padding:5px 7px; font-size:11.5px; color:var(--text); }
  .fw-thread { flex:1; overflow-y:auto; padding:6px; }
  .fw-in { padding:10px 12px; border-top:1px solid var(--border); display:flex; gap:7px; }
  .fw-in textarea { flex:1; min-height:40px; max-height:120px; background:var(--bg); border:1px solid var(--border-strong); border-radius:9px; padding:9px 11px; font-size:13px; font-family:var(--sans); color:var(--text); outline:none; resize:none; line-height:1.5; }
  .modebtn { background:var(--surface); border:1px solid var(--border-strong); padding:5px 10px; font-size:11px; font-weight:600; color:var(--muted); cursor:pointer; border-radius:7px; }
  .modebtn.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  @media (max-width:760px) {
    main { margin-left:0 !important; }
    /* ヘッダは残し、ドロワーはその下から展開 */
    .topbar { position:sticky; top:0; z-index:46; }
    aside { top:58px; height:calc(100vh - 58px); z-index:44; box-shadow:4px 0 20px rgba(31,30,29,.12); }
    .nav-ovl { top:58px; }
    aside .brand { display:none; }
    /* iOS: 入力で自動ズームしないよう16px以上に */
    input, textarea, select { font-size:16px !important; }
    /* topbar が潰れないよう説明を隠し、検索を縮める */
    .topbar { padding:14px 16px; gap:10px; }
    .topbar .desc { display:none; }
    .crumb { display:none; }
    .topbar h2 { font-size:18px; }
    .topbar { padding:12px 14px; gap:8px; flex-wrap:nowrap; overflow:hidden; }
    .wordmark { font-size:15px; flex-shrink:1; }
    .search { min-width:0; }
    .search input { width:100%; max-width:140px; }
    #newbtn { padding:8px 9px !important; flex-shrink:0; }
    .pagehead { padding:10px 14px 0; }
    .pagehead h2 { font-size:19px; }
    .content { padding:10px 14px 70px; }
    /* グリッドは1カラムへ — 最小幅による横スクロールを防止 */
    .pgrid { grid-template-columns:1fr; gap:10px; }
    .card-grid { grid-template-columns:1fr; gap:8px; }
    .mcp-grid { grid-template-columns:1fr 1fr; gap:6px; }
    .search { margin-left:auto; }
    .search input { width:128px; }
    #newbtn { margin-left:6px !important; padding:8px 11px !important; }
    /* オペレーターのコントロール行を折り返す */
    .fw-ctl { flex-wrap:wrap; }
    .fw-ctl select { flex:1 1 40%; min-width:0; }
    .rowitem { grid-template-columns:1fr; gap:6px; }
    .rowitem .act { display:none; }
    .tiles { grid-template-columns:1fr 1fr; }
    .two { grid-template-columns:1fr; }
    .search input { width:150px; }
    /* オペレーター — topbar下からbottomまで（キーボード展開時も見える） */
    .fw { left:0; right:0; top:58px; bottom:0; width:auto; height:auto;
          border-radius:0; border:none; border-top:1px solid var(--border); }
    .fw.on { display:flex; animation:sheetUp .22s ease; }
    @keyframes sheetUp { from { transform:translateY(100%);} to { transform:translateY(0);} }
    .fw-ctl { gap:5px; padding:8px 10px; }
    .fw-ctl select { flex:1; min-width:0; }
    .fw-head .t { font-size:15px; }
    .fab { right:16px; bottom:16px; width:52px; height:52px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside>

<script>
const META = {
  home:     { title:"ホーム",        desc:"ClaudeManager が保持するアーティファクトの紹介", search:false },
  skills:   { title:"スキル",        desc:"ローカル及びプラグインのスキル定義", search:true,  create:"skill" },
  agents:   { title:"サブエージェント", desc:"利用可能なサブエージェント定義",     search:true,  create:"agent" },
  projects: { title:"プロジェクト",    desc:"各プロジェクトの概要・ロードマップ・課題", search:true },
  config:   { title:"設定",          desc:"全体指示（CLAUDE.md）と settings.json", search:false },
  sessions: { title:"セッション",     desc:"進行中・最近のClaude Codeセッションの可視化と参加", search:false },
  routines: { title:"ルーチン",       desc:"バックグラウンド・エージェントの稼働状況とルーチン最終実行", search:false },
  stats:    { title:"ダッシュボード",   desc:"全機能の概要 — 稼働状況・セッション・プロジェクト・連携", search:false },
};
const CREATE_HINT = {
  skill: "~/.claude/skills/<名前>/SKILL.md を雛形付きで作成します。",
  agent: "~/.claude/agents/<名前>.md を雛形付きで作成します。",
  memory:"このプロジェクトの memory に新しいメモリを作成します。",
};
let active = "skills", cache = {}, curPath = null, filterText = "";

// リモート公開時のトークンをURLから取得し、全API呼び出しに付与
const TOKEN = new URLSearchParams(location.search).get("token");
const api = (url, opts={}) => {
  const headers = { ...(opts.headers||{}) };
  if (TOKEN) headers["x-cc-token"] = TOKEN;
  return fetch(url, { ...opts, headers });
};

const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ── ラインアイコン（絵文字の代替・currentColorで統一） ──
const ICONS = {
  zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  hex:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>',
  folder:'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
  msg:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/>',
  link:'<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
  inbox:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
  compass:'<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>',

async function go(tab) {
  active = tab; filterText = "";
  document.querySelectorAll(".navitem").forEach(n => n.classList.toggle("active", n.dataset.tab===tab));
  document.getElementById("ttl").textContent = META[tab].title;
  document.getElementById("desc").textContent = META[tab].desc;
  document.getElementById("newbtn").style.display = META[tab].create ? "block" : "none";
  const c = document.getElementById("content");
  c.innerHTML = '<div class="empty">読み込み中…</div>';
  if (tab === "home") {
    const [skills,agents,projects,sessions,mcp,reqs] = await Promise.all([
      api('/api/skills').then(r=>r.json()),
      api('/api/agents').then(r=>r.json()),
      api('/api/projects').then(r=>r.json()),
      api('/api/sessions').then(r=>r.json()),
      api('/api/mcp').then(r=>r.json()).catch(()=>({connected:[],needsAuth:[]})),
      api('/api/requests').then(r=>r.json()).catch(()=>({requests:[]})),
    ]);
    cache.skills=skills; cache.agents=agents; cache.projects=projects; cache.sessions=sessions; cache.mcp=mcp; cache.requests=(reqs&&reqs.requests)||[];
    return drawHome();
  }
  if (tab === "sessions") {
    cache.sessions = await (await api(`/api/sessions`)).json();
    return drawSessions();
  }
  if (tab === "routines") {
    cache.routines = await (await api(`/api/routines`)).json();
    return drawRoutines();
  }
  if (tab === "stats") {
    const [stats,sessions,projects,skills,agents,mcp,reqs] = await Promise.all([
      api('/api/stats').then(r=>r.json()),
      api('/api/sessions').then(r=>r.json()),
      api('/api/projects').then(r=>r.json()),
      api('/api/skills').then(r=>r.json()),
      api('/api/agents').then(r=>r.json()),
      api('/api/mcp').then(r=>r.json()).catch(()=>({connected:[],needsAuth:[]})),
      api('/api/requests').then(r=>r.json()).catch(()=>({requests:[]})),
    ]);
    cache.stats=stats; cache.sessions=sessions; cache.projects=projects; cache.skills=skills; cache.agents=agents; cache.mcp=mcp; cache.requests=(reqs&&reqs.requests)||[];
    return drawDashboard();
  }
  if (!cache[tab]) cache[tab] = await (await api(`/api/${tab}`)).json();
  draw();
}

const ago = (iso) => {
  if (!iso) return "";
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if (s<60) return s+"秒前"; if (s<3600) return Math.floor(s/60)+"分前";
  if (s<86400) return Math.floor(s/3600)+"時間前"; return Math.floor(s/86400)+"日前";
};
const baseName = p => (p||"").split("/").filter(Boolean).pop() || p;

function applyFilter(){ filterText = document.getElementById("search").value.toLowerCase().trim(); draw(); }

let chat = { sessionId: null, messages: [], busy:false, busyMsg:"" };

function newSessionId(){ return (crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&3|8)).toString(16);})); }

const ENGINE_MODELS = {

function onEngineChange(){

// 初期表示時にモデルリストをセット

function toggleWidget(force){
  widgetOpen = (force===undefined) ? !widgetOpen : !!force;
  document.getElementById("fw").classList.toggle("on", widgetOpen);
  if(widgetOpen){ document.getElementById("fab").classList.remove("has-unseen"); chat.unseen=0; updateDot();
    fillWidgetTargets(); renderThread(); setTimeout(()=>document.getElementById("fw-prompt")?.focus(),50); }
}
function updateDot(){ const d=document.getElementById("fab-dot"); if(d){ d.textContent=chat.unseen||""; document.getElementById("fab").classList.toggle("has-unseen", !!chat.unseen); } }
function setBusy(on,msg){
  chat.busy=on; chat.busyMsg=msg||"";

  document.getElementById("fw-head")?.classList.toggle("busy",on);
  renderThread();
}
function setMode(m){ asMode=m; const a=document.getElementById("fw-md-apply"),p=document.getElementById("fw-md-propose"); if(a&&p){a.classList.toggle("on",m==="apply");p.classList.toggle("on",m==="propose");} }
function resetChat(){ chat={sessionId:null,messages:[],busy:false,busyMsg:"",unseen:0}; updateDot(); renderThread(); }

// 各メニューの操作をオペレーターに記録（溜まる）
function logActivity(text){
  chat.messages.push({role:"system",text});
  if(!widgetOpen){ chat.unseen=(chat.unseen||0)+1; updateDot(); }
  renderThread();
}

function renderThread(){
  const t = document.getElementById("fw-thread"); if(!t) return;
  if (!chat.messages.length && !chat.busy){ t.innerHTML = `<div class="empty" style="padding:34px;font-size:13px">相談や指示をどうぞ。<br>各メニューの操作もここに記録されます。</div>`; return; }
  t.innerHTML = chat.messages.map((m,i)=>{
    if (m.role==="system") return `<div style="margin:6px 8px;font-size:11.5px;color:var(--muted);display:flex;gap:6px;align-items:center"><span style="width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0"></span><span>${esc(m.text)}</span></div>`;
    if (m.role==="user") return `<div style="display:flex;justify-content:flex-end;margin:8px"><div style="background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:12px 12px 4px 12px;padding:8px 12px;font-size:13px;max-width:85%;white-space:pre-wrap">${esc(m.text)}</div></div>`;
    // フォールバックボタン（エラー時のみ表示）
    let fallbackHtml = "";
    if (m.isError && m.engine === "claude") {
      fallbackHtml = `<div style="margin-top:8px;padding:8px 10px;background:#fbeae6;border:1px solid #eccabf;border-radius:9px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="color:#b3402a;font-weight:600">⚠ Claudeでエラーが発生しました</span>
        <button class="modebtn" style="border-color:#5c8a5a;color:#5c8a5a" onclick="retryWithEngine('grok',${i})">🛠 Grokで再試行</button>
        <button class="modebtn" style="border-color:#5a76b8;color:#5a76b8" onclick="retryWithEngine('agy',${i})">🚀 AGYで再試行</button>
      </div>`;
    }
    const applyBtn = (m.mode==="propose" && m.canApply) ? `<div style="margin-top:7px"><button class="modebtn" style="border-color:var(--accent);color:var(--accent)" onclick="applyProposal(${i})">この案で実行</button></div>` : "";
    const engineLabel = m.engine && m.engine !== "claude" ? ` [${m.engine.toUpperCase()}]` : "";
    return `<div style="margin:8px"><div style="font-size:9.5px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${esc((m.model||""))}${engineLabel} · ${m.mode==="apply"?"実行":"相談"}</div><div style="background:var(--surface-2);border:1px solid var(--border);border-radius:12px 12px 12px 4px;padding:10px 13px;font-size:13px;white-space:pre-wrap;line-height:1.65">${esc(m.text)||"(出力なし)"}</div>${applyBtn}${fallbackHtml}</div>`;
  }).join("") + (chat.busy?`<div style="margin:10px 8px;color:var(--accent);font-size:12.5px;display:flex;align-items:center;gap:8px"><span style="width:12px;height:12px;border:2px solid var(--accent-line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite"></span>${esc(chat.busyMsg||"作業中…")}</div>`:"");
  t.scrollTop = t.scrollHeight;
}

function targetBody(){
  const tv=document.getElementById("fw-target").value, isProj=tv.startsWith("project::");
  return { target:isProj?"project":"config", cwd:isProj?tv.slice(9):undefined };
}
async function sendChat(){
  const ta=document.getElementById("fw-prompt"); const prompt=ta.value.trim(); if(!prompt) return;
  ta.value=""; await runChat(prompt, asMode);
}
async function applyProposal(i){
  const userMsg = chat.messages.slice(0,i).reverse().find(m=>m.role==="user");
  await runChat((userMsg?userMsg.text:"前の提案を実行して"), "apply");
}
// フォールバック再試行（エラーメッセージの直前のユーザー発言を取得して別エンジンで実行）
async function retryWithEngine(engine, msgIdx){
  const userMsg = chat.messages.slice(0,msgIdx).reverse().find(m=>m.role==="user");
  if (!userMsg) return;
  // エンジン切り替え
  document.getElementById("fw-engine").value = engine;
  onEngineChange();
  logActivity(`⚡ ${engine.toUpperCase()} に切り替えて再試行します`);
  await runChat(userMsg.text, asMode, engine);
}
async function runChat(prompt, mode, forceEngine){
  if(!widgetOpen) toggleWidget(true);
  const engine = forceEngine || document.getElementById("fw-engine").value;
  const model=document.getElementById("fw-model").value; const tb=targetBody();
  const isNew = !chat.sessionId; if(isNew && engine === "claude") chat.sessionId=newSessionId();
  chat.messages.push({role:"user",text:prompt});
  const engineLabel = engine !== "claude" ? ` [${engine.toUpperCase()}]` : "";
  setBusy(true,`${model}${engineLabel} が${mode==="apply"?"作業":"検討"}中…`);
  document.getElementById("fw-send").disabled=true;
  try{
    const body={prompt,model,mode,...tb,sessionId:chat.sessionId,isNew,engine};
    const j=await (await api("/api/assistant",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})).json();
    if(!j.ok){ chat.messages.push({role:"assistant",text:"エラー: "+j.error,mode,model,engine,isError:true}); }
    else{
      chat.messages.push({role:"assistant",text:j.output,mode:j.mode,model:j.model,engine:j.engine||engine,canApply:j.mode==="propose"});
      if(j.mode==="apply"){ cache.skills=null;cache.agents=null;cache.projects=null; if(active&&META[active]) go(active); }
    }
  }catch(e){ chat.messages.push({role:"assistant",text:"通信エラー: "+e.message,mode,model,engine,isError:true}); }
  setBusy(false); document.getElementById("fw-send").disabled=false;
}

// セッション要約を更新ログ風にレンダリング（何を・どう変えたか／スキル・サブエージェント利用）
function renderDigest(d, s){
  const dur = (d.start&&d.end) ? Math.max(1,Math.round((new Date(d.end)-new Date(d.start))/60000)) : null;
  const chip = (label,val,color)=>`<span class="d-chip" style="${color?`border-color:${color};color:${color}`:''}">${esc(label)}${val!=null?` <b>${val}</b>`:''}</span>`;
  // 変更ファイル（更新ログの本体）
  const changes = (d.changes||[]).length ? `
    <div class="lp-card">
      <div class="lp-h">プロジェクトへの変更 <span class="pj-src">${d.changes.length}ファイル</span></div>
      <div class="d-changes">${d.changes.map(ch=>`
        <div class="d-change">
          <span class="d-act ${d.creates&&d.creates.includes(ch.name)?'new':'edit'}">${d.creates&&d.creates.includes(ch.name)?'新規':'変更'}</span>
          <span class="d-file">${esc(ch.name)}</span>
          ${ch.count>1?`<span class="d-cnt">×${ch.count}</span>`:''}
        </div>`).join("")}</div>
    </div>` : `<div class="lp-card"><div class="lp-h">プロジェクトへの変更</div><div style="color:var(--faint);font-size:12.5px">ファイル変更なし（調査・相談中心のセッション）</div></div>`;
  // スキル / サブエージェント利用の可視化
  const usedSkills=(d.skills||[]), usedAgents=(d.agents||[]);
  const usage = (usedSkills.length||usedAgents.length) ? `
    <div class="lp-card">
      <div class="lp-h">使用したスキル・サブエージェント</div>
      <div class="pj-tags">
        ${usedSkills.map(x=>`<span class="pj-tag" style="display:inline-flex;align-items:center;gap:4px;background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)">${ic('zap',13)}${esc(x.name)}${x.count>1?` ×${x.count}`:''}</span>`).join("")}
        ${usedAgents.map(x=>`<span class="pj-tag" style="display:inline-flex;align-items:center;gap:4px;background:#e9edf6;border-color:#cdd8ee;color:var(--info)">${ic('hex',13)}${esc(x.name)}${x.count>1?` ×${x.count}`:''}</span>`).join("")}
      </div>
    </div>` : '';
  // 決定事項を機能エリア（主語）ごとにグルーピングして羅列
  const grp = (d.decisionGroups&&d.decisionGroups.length) ? d.decisionGroups
            : ((d.decisions||[]).length?[{area:"変更内容",items:d.decisions}]:[]);
  const decisions = grp.length ? `
    <div class="lp-card">
      <div class="lp-h">決定・実施したこと <span class="pj-src">${(d.decisions||[]).length}件</span></div>
      ${grp.map(g=>`
        <div class="d-grp">
          <div class="d-grp-h">${esc(s.project||'')}<span style="color:var(--faint)"> ／ </span>${esc(g.area)}</div>
          <div class="d-decs">${g.items.map(x=>`<div class="d-dec"><span class="d-check">✓</span><span>${esc(x)}</span></div>`).join("")}</div>
        </div>`).join("")}
    </div>` : '';
  // マネージャー提案（スキル化など。サーバー判定があればそれを優先）
  const sg = d.suggest;
  const sgText = sg ? sg.text : 'この作業の続き・要約・改善をマネージャーに相談できます。';
  const ctx = {goal:d.firstAsk||"", decisions:(d.decisions||[]).slice(0,12), changes:(d.changes||[]).map(c=>c.name), kind:(sg&&sg.kind)||""};

    <div class="lp-card" style="background:linear-gradient(180deg,var(--accent-soft),var(--surface));border-color:var(--accent-line)">

        <button class="btn save" onclick='proposeSkill(${JSON.stringify(ctx)})'>${sg?'スキル化を相談':'これをスキル化を相談'}</button>
        <button class="btn cancel" onclick='consultSession(${JSON.stringify({goal:d.firstAsk||"",last:d.lastText||""})})'>続き・要約を相談</button>
      </div>
    </div>`;
  return `
    <div class="lp-card">
      <div class="lp-h">サマリー</div>
      <div class="d-chips">
        ${chip('やりとり', s.events)}
        ${dur!=null?chip('作業時間', dur+'分'):''}
        ${chip('変更', (d.changes||[]).length+'件')}
        ${usedSkills.length?chip('スキル', usedSkills.length, 'var(--accent)'):''}
        ${usedAgents.length?chip('サブエージェント', usedAgents.length, 'var(--info)'):''}

      ${d.firstAsk?`<div style="font-size:14px;line-height:1.7;margin-top:12px"><span style="color:var(--faint);font-size:11px;font-weight:700">目的</span><br>${esc(d.firstAsk)}</div>`:''}
      ${d.lastText?`<div style="font-size:13px;line-height:1.7;margin-top:12px;color:var(--muted)"><span style="color:var(--faint);font-size:11px;font-weight:700">最後の状況</span><br>${esc(d.lastText)}</div>`:''}
    </div>
    ${decisions}${changes}${usage}${propose}`;
}
function proposeSkill(ctx){
  toggleWidget(true); setMode('propose');
  const ta=document.getElementById("fw-prompt");
  const decs=(ctx.decisions||[]).slice(0,10).map(x=>"・"+x).join("\n");
  if(ta){ ta.value=`このセッションの手順をスキル化したいです。\n目的: ${ctx.goal}\n決定・実施したこと:\n${decs}\n変更ファイル: ${(ctx.changes||[]).join(", ")}\n\nこの一連の流れを再利用可能なスキル（~/.claude/skills/）にまとめる提案をしてください。スキル名・説明・手順の雛形を示し、良ければ作成してください。`; ta.focus(); }

function consultSession(ctx){

  const ta=document.getElementById("fw-prompt");
  if(ta){ ta.value=`前回セッションの続きを相談したいです。\n目的: ${ctx.goal}\n直近の状況: ${ctx.last}\n\n要約と、次にやるべきことを提案してください。`; ta.focus(); }

async function resumeSession(){
  const prompt=document.getElementById("rs-prompt").value.trim(); if(!prompt||!curSession) return;
  const model=document.getElementById("rs-model").value, apply=document.getElementById("rs-apply").checked;
  const out=document.getElementById("rs-out"), btn=document.getElementById("rs-send");
  btn.disabled=true; out.innerHTML=`<div style="color:var(--muted);font-size:13px">送信中…</div>`;
  try{
    const j=await (await api("/api/session/resume",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:curSession.id,cwd:curSession.cwd,prompt,model,apply})})).json();
    out.innerHTML=j.ok?`<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:11px;font-size:13px;white-space:pre-wrap;line-height:1.6">${esc(j.output)||"(出力なし)"}</div>`:`<div style="color:#b3402a">${esc(j.error)}</div>`;
  }catch(e){ out.innerHTML=`<div style="color:#b3402a">通信エラー: ${esc(e.message)}</div>`; }
  btn.disabled=false;
}

function match(...fields){ return !filterText || fields.some(f => (f||"").toLowerCase().includes(filterText)); }

let jaMode = false;           // 日本語表示（既定OFF＝Claude枠を使わない。押した時だけ翻訳）
const jaCache = {};           // 原文→日本語
function isEnglish(t){ return t && !/[ぁ-んァ-ヶ一-龥]/.test(t); }
function dispDesc(t){ return (jaMode && jaCache[t]) ? jaCache[t] : (t||""); }

function drawList(data) {
  const c = document.getElementById("content");
  const rows = (data||[]).filter(s => match(s.name, s.description, s.source));
  const needTrans = rows.some(s => isEnglish(s.description) && !jaCache[s.description]);
  if (!rows.length) { c.innerHTML = `<div class="empty">${filterText?"該当なし":"項目がありません"}</div>`; return; }
  c.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="modebtn ${jaMode?'on':''}" onclick="toggleJa()">日本語で表示</button>
    </div>
    <div class="card-grid">${rows.map(s => `
      <div class="scard" onclick="openFile('${esc(s.path)}','${esc(s.name)}',{deletable:${s.source==='local'||s.source==='user'}})">
        <div class="scard-h"><span class="scard-nm">${esc(s.name)}</span><span class="badge ${badge(s.source)}">${esc(srcLabel(s.source))}</span></div>
        <div class="scard-d">${esc(dispDesc(s.description))||'<span style="color:var(--faint)">説明なし</span>'}</div>
      </div>`).join("")}</div>`;
  if (jaMode && needTrans) translateVisible(rows);
}
function toggleJa(){ jaMode=!jaMode; draw(); }
async function translateVisible(rows){
  const texts = [...new Set(rows.map(s=>s.description).filter(t=>isEnglish(t)&&!jaCache[t]))];
  if(!texts.length) return;
  try{
    const j = await (await api("/api/translate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({texts})})).json();
    if(j.ok && Array.isArray(j.translations)){ texts.forEach((t,i)=>{ if(j.translations[i]) jaCache[t]=j.translations[i]; }); if(active==='skills'||active==='agents') draw(); }
  }catch{}
}

/* ── 並べ替え（カード共通） ── */
let sortMode = { skills:"usage", agents:"usage" };
function setSort(view, mode){ sortMode[view]=mode; draw(); }
function sortCards(rows, view){
  const m=sortMode[view]||"usage";
  const a=[...rows];
  if(m==="name") a.sort((x,y)=>(x.name||"").localeCompare(y.name||""));
  else if(m==="source") a.sort((x,y)=>(x.source||"").localeCompare(y.source||"")|| (y.usageCount||0)-(x.usageCount||0));
  else a.sort((x,y)=>(y.usageCount||0)-(x.usageCount||0));
  return a;
}
function sortBar(view){
  const m=sortMode[view]||"usage";
  const opt=(v,l)=>`<button class="modebtn ${m===v?'on':''}" onclick="setSort('${view}','${v}')">${l}</button>`;
  return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
    <span style="font-size:11px;color:var(--faint);font-weight:600">並べ替え</span>
    ${opt('usage','利用が多い順')}${opt('name','名前順')}${opt('source','種類順')}</div>`;
}

  const info=agentInfo(a);
  toggleWidget(true); setMode('propose');
  const ta=document.getElementById("fw-prompt");
  if(ta){ ta.value=`サブエージェント「${a.name}（${info.ja}）」について相談です。\nこのエージェントを今のプロジェクトでどう活かせるか、具体的な使い所と指示例をいくつか教えてください。`; ta.focus(); }
}
function proposeAgent(){
  toggleWidget(true); setMode('propose');
  const ta=document.getElementById("fw-prompt");
  if(ta){ ta.value=`新しいサブエージェントを作りたいです。\nどんな役割のエージェントがあると便利か一緒に考えてください。用途・得意分野・使うツール・口調などを整理し、~/.claude/agents/ に置く定義（frontmatter＋本文）の雛形を提案してください。良ければ作成までお願いします。`; ta.focus(); }
}

function drawProjects(data) {
  const c = document.getElementById("content");
  const rows = (data||[]);
  window._projData = rows;
  if (!rows.length) { c.innerHTML = `<div class="empty">プロジェクトがありません</div>`; return; }
  c.innerHTML = `<div class="pgrid">` + rows.map((p,i) => {
    const rm = p.roadmap, pct = rm && rm.total ? Math.round(rm.done/rm.total*100) : null;
    const ov = p.overview ? p.overview.text : (rm?'ロードマップあり':'概要なし');
    return `<div class="pcard-c" onclick="openProject(${i})">
      <div class="pcard-c-top">
        <div style="min-width:0">
          <div class="pcard-c-nm">${esc(p.name)}</div>
          <div class="meta">${p.sessionCount?`利用 ${p.sessionCount}回`:'未使用'}${p.issues.length?` · <span style="color:var(--accent)">課題 ${p.issues.length}</span>`:''}${p.hasProjectDir?'':' · フォルダ未検出'}</div>
        </div>
        ${pct!=null?`<div class="ring" style="--p:${pct}"><span>${pct}%</span></div>`:'<span class="fa">→</span>'}
      </div>
      <div class="pcard-c-ov">${esc(ov)}</div>
    </div>`;
  }).join("") + `</div>`;
}

function openProject(i){ drawProjectDetail((window._projData||[])[i]); }

function drawProjectDetail(p){
  if(!p) return;
  const c = document.getElementById("content");
  document.getElementById("ttl").textContent = p.name;
  document.getElementById("desc").textContent = p.path;
  const rm = p.roadmap, pct = rm && rm.total ? Math.round(rm.done/rm.total*100) : null;
  const R=52, C=2*Math.PI*R;
  window._lpTasks = (rm && rm.pending) || [];
  window._lpIssues = p.issues || [];
  window._lpClaudeMd = p.claudeMd || '';
  window._lpProject = { name: p.name, key: p.key };

  const hero = `<div class="lp-hero">
    <button class="linkbtn" onclick="go('projects')" style="margin-bottom:14px">← 一覧へ</button>
    <h1 class="lp-title">${esc(p.name)}</h1>
    <div class="lp-path">${esc(p.path)}${p.sessionCount?` · 利用 ${p.sessionCount}回`:''}</div>
    ${p.overview?`<p class="lp-lead">${esc(p.overview.text)}</p>`:'<p class="lp-lead muted">README.md / CLAUDE.md に概要がありません</p>'}
    <div class="lp-actions">
      ${p.hasProjectDir?`<button class="btn save" onclick="updateProjectStatus('${esc(p.name)}','${esc(p.path)}')">状況を更新</button>`:''}
      ${p.claudeMd?`<button class="btn cancel" onclick="openFile('${esc(p.claudeMd)}','CLAUDE.md',{deletable:false})">CLAUDE.md</button>`:''}
      <button class="btn cancel" onclick="openCreate('memory','${esc(p.key)}')">＋メモリ</button>
      <button class="btn cancel" style="margin-left:auto;color:#b3402a;border-color:#eccabf" onclick="deleteProject('${esc(p.key)}','${esc(p.name)}')">削除</button>
    </div>
  </div>`;

  let roadmap = '';
  if (rm) {
    const gauge = pct!=null ? `<div class="lp-gauge">
      <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="${R}" class="g-bg"/><circle cx="60" cy="60" r="${R}" class="g-fg" style="stroke-dasharray:${C};stroke-dashoffset:${C*(1-pct/100)}"/></svg>
      <div class="lp-gauge-c"><b>${pct}%</b><span>${rm.done}/${rm.total}</span></div>
    </div>`:'';
    const phases = rm.phases.length ? `<div class="lp-timeline">${rm.phases.map(x=>`<div class="lp-tl"><span class="lp-dot"></span><div class="lp-tln">${esc(x)}</div></div>`).join("")}</div>`:'';
    const pend = rm.pending.length ? `<div class="lp-h" style="margin-top:14px">残タスク <span style="color:var(--faint);font-size:10px;font-weight:400;letter-spacing:0">タップして対応</span></div><div class="lp-checks">${rm.pending.map((x,i)=>`<div class="lp-chk" style="cursor:pointer" onclick="openTaskModal(${i},'task')"><span class="lp-box"></span><span>${esc(x)}</span></div>`).join("")}</div>`:'';
    roadmap = `<div class="lp-card"><div class="lp-h">ロードマップ <span class="pj-src">${esc(rm.source)}</span></div>
      <div class="lp-rm">${gauge}<div style="flex:1;min-width:0">${phases||'<span style="color:var(--faint);font-size:12px">フェーズ情報なし</span>'}</div></div>${pend}</div>`;
  }

  const issues = p.issues.length ? `<div class="lp-card"><div class="lp-h">課題・問題 <span style="color:var(--faint);font-size:10px;font-weight:400;letter-spacing:0">タップして対応</span></div>${p.issues.map((x,i)=>`<div class="lp-chk warn" style="cursor:pointer" onclick="openTaskModal(${i},'issue')"><span class="lp-box warn"></span><span>${esc(x)}</span></div>`).join("")}</div>`:'';

  const mem = p.memories.length ? `<div class="lp-card"><div class="lp-h">メモリ <span class="pj-src">${p.memoryCount}件</span></div>${p.memories.map(m=>`<div class="frow" onclick="openFile('${esc(m.path)}','${esc(m.name)}',{deletable:true})"><div class="fn"><span class="t" style="color:var(--text)">${esc(m.description||m.name)}</span></div><span class="fa">開く</span></div>`).join("")}</div>`:'';

  c.innerHTML = `<div class="lp">${hero}<div id="lp-recall"></div>${roadmap}${issues}${mem}<div id="lp-activity"><div class="lp-card"><div class="lp-h">活動の記録</div><div style="color:var(--faint);font-size:12px">読み込み中…</div></div></div></div>`;
  loadActivity(p.key);
}

const dayLabel = iso => { const d=new Date(iso); const t=new Date(); const y=new Date(t-864e5);
  const same=(a,b)=>a.toDateString()===b.toDateString();
  if(same(d,t))return "今日"; if(same(d,y))return "昨日";
  return `${d.getMonth()+1}/${d.getDate()}（${"日月火水木金土"[d.getDay()]}）`; };

async function loadActivity(key){
  let d; try{ d = await (await api(`/api/project-activity?key=${encodeURIComponent(key)}`)).json(); }catch{ return; }
  const ss = (d&&d.sessions)||[];
  // 前回のつづき（記憶の入口）
  const recall = document.getElementById("lp-recall");
  if(recall && ss[0] && ss[0].firstAsk){
    const s=ss[0];
    recall.innerHTML = `<div class="lp-card" style="background:linear-gradient(180deg,var(--accent-soft),var(--surface));border-color:var(--accent-line)">
      <div class="lp-h">前回のつづき · ${dayLabel(s.start)}</div>
      <div style="font-size:14px;line-height:1.7">「${esc(s.firstAsk)}」</div>
      ${s.edits.length?`<div style="font-size:11.5px;color:var(--muted);margin-top:8px">編集: ${esc(s.edits.join(", "))}</div>`:''}
      <button class="btn save" style="margin-top:12px" onclick="resumeFrom('${esc(key)}','${esc(s.id)}')">ここから再開</button>
    </div>`;
  }
  // 活動タイムライン（日付ごと）
  const el = document.getElementById("lp-activity"); if(!el) return;
  if(!ss.length){ el.innerHTML = `<div class="lp-card"><div class="lp-h">活動の記録</div><div style="color:var(--faint);font-size:12px">記録がありません</div></div>`; return; }
  const byDay={}; ss.forEach(s=>{ const k=s.start?new Date(s.start).toDateString():"-"; (byDay[k]=byDay[k]||[]).push(s); });
  el.innerHTML = `<div class="lp-card"><div class="lp-h">活動の記録 <span class="pj-src">${ss.length}セッション</span></div>
    ${Object.entries(byDay).map(([day,list])=>`
      <div class="act-day">${list[0].start?dayLabel(list[0].start):"-"}</div>
      ${list.map(s=>`<div class="act-row">
        <div class="act-ask">${esc(s.firstAsk||"（やりとりの記録）")}</div>
        ${s.edits.length?`<div class="act-meta">編集: ${esc(s.edits.join(", "))}</div>`:''}
        <div class="act-meta">${s.turns} 往復</div>
      </div>`).join("")}
    `).join("")}</div>`;
}
function resumeFrom(key,id){
  const p=(window._projData||[]).find(x=>x.key===key);
  toggleWidget(true); setMode('apply');
  const ta=document.getElementById("fw-prompt");
  if(ta){ ta.value=`前回のセッションの続きから再開したいです。直近の作業内容を要約し、次に何をすべきか提案してください。`; ta.focus(); }
}

async function deleteProject(key,name){
  if(!confirm(`「${name}」をClaudeManagerから削除します（記録はゴミ箱に退避・復元可）。よろしいですか？`)) return;
  const j = await (await api(`/api/project?key=${encodeURIComponent(key)}`,{method:"DELETE"})).json();
  if(j.ok){ cache.projects=null; go('projects'); } else alert("削除失敗: "+j.error);
}

/* ── 課題・タスク詳細モーダル ── */
function openTaskModal(idx, type){
  const text = type==='task' ? (window._lpTasks||[])[idx] : (window._lpIssues||[])[idx];
  if(!text) return;
  document.getElementById("task-d-title").textContent = type==='task' ? '残タスク' : '課題';
  const ofb=document.getElementById("task-open-file");
  ofb.style.display=""; ofb.textContent="いま相談"; ofb.setAttribute("onclick","sendTaskToAssistant()");
  const sb=document.getElementById("task-send-btn"); sb.setAttribute("onclick","createRequest()"); sb.textContent="マネージャーに依頼";
  document.getElementById("task-d-body").innerHTML = `
    <div style="font-size:13.5px;line-height:1.7;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px">${esc(text)}</div>
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">補足 / 背景（任意）</div>
    <textarea id="task-note" placeholder="背景・希望・締切など…（マネージャーが優先度づけに使います）" style="width:100%;min-height:80px;background:var(--bg);border:1px solid var(--border-strong);border-radius:9px;padding:10px 12px;font-size:14px;font-family:var(--sans);color:var(--text);outline:none;resize:vertical;box-sizing:border-box"></textarea>
    <div style="font-size:11.5px;color:var(--faint);margin-top:8px;line-height:1.6">「依頼」すると<b>マネージャーの受信箱（依頼ボード）</b>に登録され、自動で優先度がつきます。すぐ相談したい時は下の「いま相談」を押してください。</div>`;
  window._taskIdx=idx; window._taskType=type;
  document.getElementById("taskModal").classList.add("on");
  setTimeout(()=>document.getElementById("task-note")?.focus(),80);
}
function closeTaskModal(){ document.getElementById("taskModal").classList.remove("on"); }
function sendTaskToAssistant(){
  const note=(document.getElementById("task-note")?.value||"").trim();
  const text = window._taskType==='task'?(window._lpTasks||[])[window._taskIdx]:(window._lpIssues||[])[window._taskIdx];
  const label = window._taskType==='task'?'残タスク':'課題';
  closeTaskModal(); toggleWidget(true); setMode('apply');
  const ta=document.getElementById("fw-prompt");
  if(ta){ ta.value=`${label}: 「${text}」${note?'\n\n背景: '+note:''}\n\nこの${label}に対応してください。`; ta.focus(); }
}
async function createRequest(){
  const note=(document.getElementById("task-note")?.value||"").trim();
  const text = window._taskType==='task'?(window._lpTasks||[])[window._taskIdx]:(window._lpIssues||[])[window._taskIdx];
  const proj=window._lpProject||{name:"",key:""};
  const sb=document.getElementById("task-send-btn"); sb.disabled=true;
  try{
    const j=await (await api("/api/requests",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project:proj.name,projectKey:proj.key,title:text,detail:note})})).json();
    if(j.ok){ cache.requests=null; closeTaskModal(); toast(`依頼を受け付けました（優先度: ${j.request.priority}）— 依頼ボードに追加`); }
    else { alert("依頼に失敗: "+j.error); }
  }catch(e){ alert("通信エラー: "+e.message); }
  sb.disabled=false;
}
let _toastT=null;
function toast(msg){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.className="on";
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.className="",2600);
}

function mcpInfo(key){ const id=key.split(":").pop(); return {id, ...(MCP_CAT[id]||{l:id,s:"",d:"",cap:[],ex:""})}; }
function mcpIcon(info){
  const letter = esc((info.l||"?")[0]);
  if(!info.s) return `<span class="mcp-fb">${letter}</span>`;
  return `<img src="https://cdn.simpleicons.org/${info.s}" width="24" height="24" loading="lazy" style="object-fit:contain" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'mcp-fb',textContent:'${letter}'}))"/>`;
}

/* ── 依頼ボード（マネージャーの受信箱） ── */
const PRIO_CLASS={"高":"h","中":"m","低":"l"};
function renderReqBoard(){
  const reqs=(cache.requests||[]).filter(r=>r.status!=="done");
  const done=(cache.requests||[]).filter(r=>r.status==="done").length;
  return `<div class="panel" style="border-color:var(--accent-line);background:linear-gradient(180deg,var(--accent-soft),var(--surface))">
    <h3 style="display:flex;align-items:center;gap:8px;justify-content:space-between">
      <span style="display:flex;align-items:center;gap:8px"><span style="color:var(--accent);display:flex">${ic('inbox',17)}</span>マネージャーの受信箱（依頼ボード）</span>
      <span style="font-size:11px;font-weight:500;color:var(--muted)">${reqs.length}件対応待ち${done?` · 完了${done}`:''}</span>
    </h3>
    ${reqs.length?reqs.map(r=>`
      <div class="req-row ${r.status==='done'?'done':''}">
        <span class="prio ${PRIO_CLASS[r.priority]||'m'}">${esc(r.priority)}</span>
        <div style="flex:1;min-width:0">
          <div class="req-t">${esc(r.title)}</div>
          <div class="req-meta">${esc(r.project)}${r.autoPriority?' · 自動優先度':''}${r.status==='doing'?' · 対応中':''}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button class="modebtn" onclick="reqConsult('${r.id}')" title="マネージャーに相談">相談</button>
          <button class="modebtn" onclick="reqCyclePrio('${r.id}')" title="優先度変更">⇅</button>
          <button class="modebtn" onclick="reqDone('${r.id}')" title="完了">✓</button>
          <button class="modebtn" onclick="reqDelete('${r.id}')" title="削除" style="color:#b3402a">✕</button>
        </div>
      </div>`).join("")
    :'<div style="color:var(--muted);font-size:13px">依頼はありません。プロジェクトの課題から「マネージャーに依頼」すると、ここに優先度つきで並びます。</div>'}
    ${reqs.length?`<button class="btn save" style="margin-top:12px" onclick="reqTriageAll()">受信箱をマネージャーに渡して着手</button>`:''}
  </div>`;
}
function reqOf(id){ return (cache.requests||[]).find(r=>r.id===id); }
async function reqPatch(id,patch){ await api("/api/requests",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,...patch})}); cache.requests=null; go('stats'); }
function reqDone(id){ reqPatch(id,{status:"done"}); }
function reqCyclePrio(id){ const r=reqOf(id); const nx={"高":"中","中":"低","低":"高"}; reqPatch(id,{priority:nx[r.priority]||"中"}); }
async function reqDelete(id){ if(!confirm("この依頼を削除しますか？"))return; await api(`/api/requests?id=${id}`,{method:"DELETE"}); cache.requests=null; go('stats'); }
function reqConsult(id){ const r=reqOf(id); if(!r)return; toggleWidget(true); setMode('apply');
  const ta=document.getElementById("fw-prompt"); if(ta){ ta.value=`【依頼】${r.project} / 優先度${r.priority}\n課題: ${r.title}${r.detail?'\n背景: '+r.detail:''}\n\nこの課題に対応してください。`; ta.focus(); } }
function reqTriageAll(){
  const reqs=(cache.requests||[]).filter(r=>r.status!=="done");
  toggleWidget(true); setMode('propose');
  const list=reqs.map(r=>`・[${r.priority}] ${r.project}: ${r.title}`).join("\n");
  const ta=document.getElementById("fw-prompt");
  if(ta){ ta.value=`受信箱に溜まっている依頼です。優先度を見直し、どれから着手すべきか順番と理由を整理して、最初の1件の進め方を提案してください。\n\n${list}`; ta.focus(); }
}
